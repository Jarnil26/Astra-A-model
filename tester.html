<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Astra A0 | Clinical Diagnostic Tester</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00f2fe;
            --secondary: #4facfe;
            --bg: #050a10;
            --card-bg: rgba(255, 255, 255, 0.03);
            --text: #e0e6ed;
            --accent: #ff007a;
            --success: #00ff88;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background: var(--bg);
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(79, 172, 254, 0.1) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(0, 242, 254, 0.05) 0%, transparent 40%);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        .container {
            width: 100%;
            max-width: 900px;
            padding: 40px 20px;
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            margin-bottom: 60px;
        }

        .logo {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: 2px;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .health-badge {
            padding: 6px 14px;
            border-radius: 20px;
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.1);
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #888;
        }

        .dot.online { background: var(--success); box-shadow: 0 0 10px var(--success); }

        .hero {
            text-align: center;
            margin-bottom: 50px;
        }

        h1 {
            font-size: 48px;
            margin-bottom: 12px;
            font-weight: 700;
        }

        .hero p {
            color: #8899aa;
            font-size: 18px;
        }

        .search-container {
            position: relative;
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            padding: 10px;
            display: flex;
            gap: 10px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .search-container:hover {
            border-color: rgba(255, 255, 244, 0.2);
            transform: translateY(-2px);
        }

        input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: white;
            padding: 15px 25px;
            font-size: 16px;
        }

        button {
            background: linear-gradient(135deg, var(--secondary), var(--primary));
            border: none;
            padding: 15px 35px;
            border-radius: 18px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 10px 20px rgba(79, 172, 254, 0.3);
        }

        button:hover {
            transform: scale(1.02);
            box-shadow: 0 15px 25px rgba(79, 172, 254, 0.4);
        }

        button:active { transform: scale(0.98); }

        .results {
            margin-top: 40px;
            display: none;
            animation: fadeIn 0.6s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .diagnostic-card {
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 24px;
            padding: 30px;
            margin-bottom: 30px;
        }

        .card-title {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #667788;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
        }

        .prediction-item {
            display: flex;
            justify-content: space-between;
            padding: 15px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
        }

        .disease-name { font-weight: 600; font-size: 18px; }
        .confidence { color: var(--primary); font-weight: 700; }

        .remedy-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }

        .remedy-section h4 {
            color: var(--secondary);
            margin-bottom: 8px;
            font-size: 15px;
        }

        .remedy-list {
            list-style: none;
            font-size: 14px;
            color: #8899aa;
        }

        .notes {
            background: rgba(0, 242, 254, 0.05);
            padding: 20px;
            border-radius: 16px;
            font-size: 14px;
            line-height: 1.6;
            color: #aabbcc;
            border-left: 3px solid var(--primary);
        }

        .loader {
            display: none;
            text-align: center;
            margin: 30px 0;
        }

        .pulse {
            width: 50px;
            height: 50px;
            background: var(--primary);
            border-radius: 50%;
            display: inline-block;
            animation: pulse 1.5s infinite ease-in-out;
        }

        @keyframes pulse {
            0% { transform: scale(0.1); opacity: 0.8; }
            100% { transform: scale(1.5); opacity: 0; }
        }

        footer {
            margin-top: auto;
            padding: 40px;
            color: #445566;
            font-size: 13px;
        }
    </style>
</head>
<body>

    <div class="container">
        <nav>
            <div class="logo">ASTRA A0</div>
            <div class="health-badge" id="healthBadge">
                <div class="dot" id="healthDot"></div>
                <span id="healthText">CONNECTING...</span>
            </div>
        </nav>

        <section class="hero">
            <h1>Clinical Intelligence</h1>
            <p>Enter patient symptoms for patterns-aware Ayurvedic diagnosis.</p>
        </section>

        <div class="search-container">
            <input type="text" id="symptomInput" placeholder="e.g. fever, joint pain, nausea..." autocomplete="off">
            <button onclick="diagnose()">DIAGNOSE</button>
        </div>

        <div class="loader" id="loader">
            <div class="pulse"></div>
            <p style="margin-top: 15px; color: var(--primary)">Scanning medical patterns...</p>
        </div>

        <div class="results" id="results">
            <div class="diagnostic-card">
                <div class="card-title">
                    <span>Differential Diagnosis</span>
                    <span id="patternTag" style="color: var(--accent); font-weight: 700;"></span>
                </div>
                <div id="predictionList"></div>
            </div>

            <div class="diagnostic-card">
                <div class="card-title">Ayurvedic Remedies & Lifestyle</div>
                <div class="remedy-grid" id="remedyGrid"></div>
            </div>

            <div class="diagnostic-card">
                <div class="card-title">Clinical Notes</div>
                <div class="notes" id="clinicalNotes"></div>
            </div>
        </div>
    </div>

    <footer>
        Astra A0 Clinical Engine &bull; Experimental AI System &bull; 22M Record Hybrid Retrieval
    </footer>

    <script>
        const API_URL = "https://astra-a-model.onrender.com";

        async function checkHealth() {
            try {
                const resp = await fetch(`${API_URL}/health`);
                const data = await resp.json();
                const dot = document.getElementById('healthDot');
                const text = document.getElementById('healthText');
                
                if (data.status === 'alive') {
                    dot.className = 'dot online';
                    text.innerText = 'SYSTEM OPTIMAL';
                } else if (data.status === 'degraded') {
                    dot.style.background = '#ffcc00';
                    text.innerText = 'INITIALIZING ENGINE...';
                }
            } catch (e) {
                console.error("Health check failed", e);
            }
        }

        async function diagnose() {
            const input = document.getElementById('symptomInput').value;
            if (!input) return;

            const symptoms = input.split(',').map(s => s.trim()).filter(s => s !== "");
            
            document.getElementById('loader').style.display = 'block';
            document.getElementById('results').style.display = 'none';

            try {
                const resp = await fetch(`${API_URL}/predict`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ symptoms })
                });

                const data = await resp.json();
                displayResults(data);
            } catch (e) {
                alert("Diagnosis failed. Make sure the engine is initialized on Render.");
            } finally {
                document.getElementById('loader').style.display = 'none';
            }
        }

        function displayResults(data) {
            const resultsDiv = document.getElementById('results');
            resultsDiv.style.display = 'block';

            // Predictions
            const predList = document.getElementById('predictionList');
            predList.innerHTML = '';
            data.predictions.slice(0, 5).forEach(p => {
                predList.innerHTML += `
                    <div class="prediction-item">
                        <div class="disease-name">${p.disease}</div>
                        <div class="confidence">${Math.round(p.confidence * 100)}%</div>
                    </div>
                `;
            });

            // Pattern
            const patternTag = document.getElementById('patternTag');
            patternTag.innerText = data.active_patterns.length > 0 ? `[${data.active_patterns[0]}]` : "";

            // Remedies
            const remedyGrid = document.getElementById('remedyGrid');
            remedyGrid.innerHTML = '';
            const types = {
                'herbs': '🌿 Herbs',
                'home_remedies': '🏠 Home Remedies',
                'yoga': '🧘 Yoga',
                'lifestyle': '✨ Lifestyle'
            };

            for (const [key, label] of Object.entries(types)) {
                const items = data.remedies[key] || [];
                if (items.length > 0) {
                    remedyGrid.innerHTML += `
                        <div class="remedy-section">
                            <h4>${label}</h4>
                            <div class="remedy-list">${items.slice(0, 3).join(', ')}</div>
                        </div>
                    `;
                }
            }

            // Notes
            document.getElementById('clinicalNotes').innerText = data.notes || "No clinical notes generated.";
        }

        // Auto health check
        checkHealth();
        setInterval(checkHealth, 30000);
    </script>
</body>
</html>
